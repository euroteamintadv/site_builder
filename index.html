<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea il tuo sito - Ponza Digitale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bianco: #ffffff;
            --azzurro-chiaro: #e6f2f8;
            --azzurro: #4fa4d8;
            --blu-mare: #2a77aa;
            --blu-scuro: #1a4b75;
            --sabbia: #f0e6d2;
            --sabbia-scuro: #d6c9ab;
            --testo: #333333;
            --grigio-chiaro: #f5f5f5;
            --ombra: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--testo);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: var(--blu-scuro);
            color: var(--bianco);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-logo {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-logo i { color: var(--azzurro); }
        .topbar-back {
            color: var(--bianco);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .topbar-back:hover { opacity: 1; }

        /* Progress + Step Nav */
        .progress-bar {
            background: var(--grigio-chiaro);
            height: 4px;
            flex-shrink: 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--azzurro), var(--blu-mare));
            transition: width 0.5s ease;
            width: 0%;
        }
        .step-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 20px;
            background: var(--grigio-chiaro);
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .step-chip {
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            background: #e0e0e0;
            color: #999;
            cursor: default;
            transition: all 0.3s;
        }
        .step-chip.visited {
            background: var(--azzurro-chiaro);
            color: var(--blu-mare);
            cursor: pointer;
        }
        .step-chip.visited:hover {
            background: var(--azzurro);
            color: var(--bianco);
        }
        .step-chip.active {
            background: var(--blu-mare);
            color: var(--bianco);
        }
        .step-arrow {
            color: #ccc;
            font-size: 10px;
        }

        /* Main Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-panel {
            width: 42%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e0e0e0;
            background: var(--bianco);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            animation: msgIn 0.4s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .msg-avatar.alberto {
            background: linear-gradient(135deg, var(--azzurro), var(--blu-mare));
            color: var(--bianco);
        }
        .msg-avatar.user {
            background: var(--sabbia);
            color: var(--blu-scuro);
        }
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .msg-bubble.alberto {
            background: var(--azzurro-chiaro);
            border-top-left-radius: 4px;
        }
        .msg-bubble.user {
            background: var(--blu-mare);
            color: var(--bianco);
            border-top-right-radius: 4px;
            margin-left: auto;
        }
        .msg-bubble strong { color: var(--blu-scuro); }
        .msg-bubble.user strong { color: var(--bianco); }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        .typing-dots span {
            width: 8px; height: 8px;
            background: var(--azzurro);
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* Chat Input Area */
        .chat-input-area {
            padding: 12px 20px;
            border-top: 1px solid #e0e0e0;
            background: var(--bianco);
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: var(--bianco);
            color: var(--testo);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .back-btn:hover { border-color: var(--azzurro); color: var(--azzurro); }
        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .chat-input:focus { border-color: var(--azzurro); }
        .chat-input:disabled { background: var(--grigio-chiaro); cursor: not-allowed; }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--azzurro);
            color: var(--bianco);
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--blu-mare); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Selection Cards */
        .selection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .sel-card {
            flex: 1;
            min-width: 120px;
            max-width: 160px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: var(--bianco);
        }
        .sel-card:hover { border-color: var(--azzurro); transform: translateY(-2px); }
        .sel-card.selected { border-color: var(--blu-mare); background: var(--azzurro-chiaro); }
        .sel-card-name { font-weight: 600; font-size: 0.85rem; margin-top: 6px; }

        .palette-preview {
            display: flex;
            height: 30px;
            border-radius: 6px;
            overflow: hidden;
        }
        .palette-preview span { flex: 1; }

        .layout-mini {
            height: 60px;
            border-radius: 6px;
            background: var(--grigio-chiaro);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .layout-mini .lm-hero { flex: 2; background: var(--blu-scuro); }
        .layout-mini .lm-body { flex: 3; display: flex; gap: 2px; padding: 2px; }
        .layout-mini .lm-col { flex: 1; background: var(--azzurro-chiaro); border-radius: 2px; }
        .layout-mini.elegante .lm-hero { flex: 3; }
        .layout-mini.moderno .lm-hero { flex: 1; }
        .layout-mini.moderno .lm-body { flex: 4; }
        .layout-mini.tradizionale .lm-hero { flex: 1.5; background: var(--sabbia-scuro); }

        .img-option {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .img-option:hover { border-color: var(--azzurro); }
        .img-option.selected { border-color: var(--blu-mare); box-shadow: 0 0 0 2px var(--azzurro); }

        /* Upload area */
        .upload-area {
            margin-top: 10px;
            border: 2px dashed var(--azzurro);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--azzurro-chiaro);
        }
        .upload-area:hover { background: #d4ecf7; }
        .upload-area i { font-size: 24px; color: var(--blu-mare); margin-bottom: 6px; }
        .upload-area p { font-size: 0.85rem; color: var(--blu-mare); }
        .upload-area input[type="file"] { display: none; }
        .upload-preview {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .upload-thumb {
            position: relative;
            width: 80px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--azzurro);
        }
        .upload-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-thumb .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Chat form */
        .chat-form { margin-top: 8px; }
        .chat-form .form-field { margin-bottom: 10px; }
        .chat-form label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--blu-scuro);
        }
        .chat-form input,
        .chat-form textarea,
        .chat-form select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-form input:focus,
        .chat-form textarea:focus,
        .chat-form select:focus { border-color: var(--azzurro); }
        .chat-form textarea { min-height: 60px; resize: vertical; }
        .chat-form-btn {
            display: inline-block;
            padding: 8px 20px;
            background: var(--azzurro);
            color: var(--bianco);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
            margin-top: 6px;
        }
        .chat-form-btn:hover { background: var(--blu-mare); }

        .type-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .type-btn {
            padding: 8px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: var(--bianco);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .type-btn:hover { border-color: var(--azzurro); background: var(--azzurro-chiaro); }
        .type-btn.selected { border-color: var(--blu-mare); background: var(--azzurro-chiaro); font-weight: 600; }

        .modify-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .modify-btn {
            padding: 8px 16px;
            border: 2px solid var(--azzurro);
            border-radius: 20px;
            background: var(--bianco);
            color: var(--blu-mare);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .modify-btn:hover { background: var(--azzurro); color: var(--bianco); }

        /* Preview Panel */
        .preview-panel {
            flex: 1;
            background: #e8e8e8;
            display: flex;
            flex-direction: column;
        }
        .preview-header {
            padding: 10px 20px;
            background: var(--grigio-chiaro);
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .preview-header span {
            font-size: 0.85rem;
            color: #666;
            font-weight: 600;
        }
        .preview-url {
            background: var(--bianco);
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-url i { color: var(--azzurro); font-size: 10px; }
        .preview-frame {
            flex: 1;
            border: none;
            background: var(--bianco);
        }
        .preview-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            gap: 16px;
        }
        .preview-placeholder i { font-size: 48px; }
        .preview-placeholder p { font-size: 1rem; }

        .deploy-animation { text-align: center; padding: 16px; }
        .deploy-spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--azzurro-chiaro);
            border-top: 4px solid var(--azzurro);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .deploy-done {
            color: #27ae60;
            font-size: 32px;
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .chat-panel { width: 100%; height: 55%; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .preview-panel { height: 45%; }
            .sel-card { min-width: 100px; max-width: 130px; }
        }
        @media (max-width: 600px) {
            .chat-panel { height: 60%; }
            .preview-panel { height: 40%; }
            .topbar { padding: 10px 16px; }
            .topbar-logo { font-size: 1rem; }
            .step-nav { padding: 6px 12px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo"><i class="fas fa-magic"></i> Ponza Digitale — Crea il tuo sito</div>
    <a href="https://euroteamintadv.github.io/ponza/" class="topbar-back"><i class="fas fa-arrow-left"></i> Torna al sito</a>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="step-nav" id="stepNav"></div>

<div class="main">
    <div class="chat-panel">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea">
            <div class="input-row">
                <button class="back-btn" id="backBtn" disabled title="Torna indietro"><i class="fas fa-arrow-left"></i></button>
                <input type="text" class="chat-input" id="chatInput" placeholder="Scrivi qui..." disabled>
                <button class="send-btn" id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="preview-panel">
        <div class="preview-header">
            <span><i class="fas fa-eye"></i> Anteprima</span>
            <div class="preview-url" id="previewUrl"><i class="fas fa-lock"></i> nomeattivita.ponza.online</div>
        </div>
        <div class="preview-placeholder" id="previewPlaceholder">
            <i class="fas fa-desktop"></i>
            <p>L'anteprima del tuo sito apparira qui</p>
        </div>
        <iframe class="preview-frame" id="previewFrame" style="display:none;"></iframe>
    </div>
</div>

<script>
const PALETTES = {
    mare:         { name: 'Mare',         primary: '#1a4b75', secondary: '#4fa4d8', accent: '#e6f2f8', bg: '#ffffff', text: '#333333' },
    tramonto:     { name: 'Tramonto',     primary: '#c0392b', secondary: '#e67e22', accent: '#f9e4b7', bg: '#fff8f0', text: '#333333' },
    limone:       { name: 'Limone',       primary: '#2d6a4f', secondary: '#f4d35e', accent: '#faf3dd', bg: '#ffffff', text: '#333333' },
    terracotta:   { name: 'Terracotta',   primary: '#8b4513', secondary: '#cd853f', accent: '#faebd7', bg: '#fff5ee', text: '#333333' },
    bougainville: { name: 'Bougainville', primary: '#8e1c6e', secondary: '#c94c9e', accent: '#f8e8f4', bg: '#ffffff', text: '#333333' },
    classica:     { name: 'Classica',     primary: '#2c3e50', secondary: '#34495e', accent: '#ecf0f1', bg: '#ffffff', text: '#333333' }
};

const LAYOUTS = {
    elegante:     { name: 'Elegante',     font: "'Georgia', serif",           heroSize: '340px', desc: 'Hero grande, font serif' },
    moderno:      { name: 'Moderno',      font: "'Segoe UI', sans-serif",     heroSize: '200px', desc: 'Minimale, sans-serif' },
    tradizionale: { name: 'Tradizionale', font: "'Palatino Linotype', serif", heroSize: '260px', desc: 'Classico, colori caldi' }
};

const BASE_IMG = 'https://euroteamintadv.github.io/ponza/img/';
const STOCK_IMAGES = [
    { id: 'caletta',    url: BASE_IMG + 'caletta-barche.jpg',   label: 'Caletta & Barche' },
    { id: 'chiaia',     url: BASE_IMG + 'chiaia-di-luna.jpg',   label: 'Chiaia di Luna' },
    { id: 'tramonto',   url: BASE_IMG + 'porto-tramonto.jpg',   label: 'Porto al Tramonto' },
    { id: 'turchese',   url: BASE_IMG + 'mare-turchese.jpg',    label: 'Mare Turchese' },
    { id: 'cristallo',  url: BASE_IMG + 'mare-cristallino.jpg', label: 'Mare Cristallino' },
    { id: 'notte',      url: BASE_IMG + 'lungomare-notte.jpg',  label: 'Lungomare Notte' },
    { id: 'faraglioni', url: BASE_IMG + 'faraglioni-hero.jpg',  label: 'Faraglioni' },
    { id: 'ponza2524',  url: BASE_IMG + 'ponza-2524.jpg',       label: 'Ponza Vista' }
];

const ACTIVITY_TYPES = [
    { id: 'ristorante', icon: 'fa-utensils', label: 'Ristorante / Pizzeria' },
    { id: 'bar', icon: 'fa-mug-hot', label: 'Bar / Caffetteria' },
    { id: 'bb', icon: 'fa-bed', label: 'B&B / Affittacamere' },
    { id: 'hotel', icon: 'fa-hotel', label: 'Hotel' },
    { id: 'negozio', icon: 'fa-store', label: 'Negozio' },
    { id: 'artigiano', icon: 'fa-hammer', label: 'Artigiano' },
    { id: 'noleggio', icon: 'fa-ship', label: 'Noleggio barche' },
    { id: 'altro', icon: 'fa-ellipsis', label: 'Altro' }
];

const STEP_LABELS = [
    'Attivita', 'Descrizione', 'Colori', 'Layout', 'Contenuti', 'Immagini', 'Anteprima', 'Conferma'
];

const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const backBtn = document.getElementById('backBtn');
const progressFill = document.getElementById('progressFill');
const previewFrame = document.getElementById('previewFrame');
const previewPlaceholder = document.getElementById('previewPlaceholder');
const previewUrl = document.getElementById('previewUrl');
const stepNavEl = document.getElementById('stepNav');

const DEFAULT_HERO = 'https://euroteamintadv.github.io/ponza/img/caletta-barche.jpg';

let siteData = {
    nome: '', tipo: '', tipoLabel: '', descrizione: '',
    palette: null, paletteKey: '',
    layout: null, layoutKey: '',
    indirizzo: '', telefono: '', orari: '', servizi: '',
    heroImage: DEFAULT_HERO, uploadedImages: [],
    sottodominio: ''
};

let currentStep = 0;
const totalSteps = 8;
let flowVersion = 0;
let visitedSteps = new Set();
let backTarget = null;

function updateProgress() {
    progressFill.style.width = ((currentStep / totalSteps) * 100) + '%';
}

function renderStepNav() {
    let html = '';
    for (let i = 1; i <= totalSteps; i++) {
        const isActive = i === currentStep;
        const isVisited = visitedSteps.has(i) && !isActive;
        const cls = isActive ? 'active' : (isVisited ? 'visited' : '');
        html += `<span class="step-chip ${cls}" data-step="${i}">${i}. ${STEP_LABELS[i-1]}</span>`;
        if (i < totalSteps) html += '<span class="step-arrow"><i class="fas fa-chevron-right"></i></span>';
    }
    stepNavEl.innerHTML = html;

    stepNavEl.querySelectorAll('.step-chip.visited').forEach(chip => {
        chip.addEventListener('click', () => {
            const target = parseInt(chip.dataset.step);
            navigateToStep(target);
        });
    });
}

function updateBackBtn() {
    backBtn.disabled = currentStep <= 1;
}

function scrollChat() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addMessage(text, sender, extraHTML) {
    const div = document.createElement('div');
    div.className = 'message';
    const isAlberto = sender === 'alberto';
    div.innerHTML = `
        <div class="msg-avatar ${sender}">${isAlberto ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>'}</div>
        <div class="msg-bubble ${sender}">${text}${extraHTML || ''}</div>
    `;
    chatMessages.appendChild(div);
    scrollChat();
    return div;
}

function showTyping() {
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typingIndicator';
    div.innerHTML = `
        <div class="msg-avatar alberto"><i class="fas fa-robot"></i></div>
        <div class="msg-bubble alberto"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    `;
    chatMessages.appendChild(div);
    scrollChat();
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
}

async function albertoSays(text, extraHTML, ver) {
    if (ver !== undefined && ver !== flowVersion) throw 'cancelled';
    showTyping();
    await delay(600 + Math.random() * 400);
    if (ver !== undefined && ver !== flowVersion) { hideTyping(); throw 'cancelled'; }
    hideTyping();
    return addMessage(text, 'alberto', extraHTML);
}

function enableInput(placeholder) {
    chatInput.disabled = false;
    sendBtn.disabled = false;
    chatInput.placeholder = placeholder || 'Scrivi qui...';
    chatInput.focus();
}

function disableInput() {
    chatInput.disabled = true;
    sendBtn.disabled = true;
    chatInput.placeholder = '';
}

function getUserInput(ver) {
    return new Promise((resolve, reject) => {
        function handler() {
            if (ver !== undefined && ver !== flowVersion) { cleanup(); reject('cancelled'); return; }
            const val = chatInput.value.trim();
            if (!val) return;
            addMessage(val, 'user');
            chatInput.value = '';
            disableInput();
            cleanup();
            resolve(val);
        }
        function keyHandler(e) {
            if (e.key === 'Enter') handler();
        }
        function cleanup() {
            sendBtn.removeEventListener('click', handler);
            chatInput.removeEventListener('keydown', keyHandler);
        }
        sendBtn.addEventListener('click', handler);
        chatInput.addEventListener('keydown', keyHandler);
    });
}

function waitForSelection(container, selector, ver) {
    return new Promise((resolve, reject) => {
        function handler(e) {
            if (ver !== undefined && ver !== flowVersion) { container.removeEventListener('click', handler); reject('cancelled'); return; }
            const card = e.target.closest(selector);
            if (!card) return;
            container.querySelectorAll(selector).forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            container.removeEventListener('click', handler);
            resolve(card.dataset.value);
        }
        container.addEventListener('click', handler);
    });
}

function waitForFormSubmit(formId, ver) {
    return new Promise((resolve, reject) => {
        const form = document.getElementById(formId);
        function handler(e) {
            if (ver !== undefined && ver !== flowVersion) { form.removeEventListener('submit', handler); reject('cancelled'); return; }
            e.preventDefault();
            const data = new FormData(form);
            const obj = {};
            data.forEach((v, k) => obj[k] = v);
            form.removeEventListener('submit', handler);
            resolve(obj);
        }
        form.addEventListener('submit', handler);
    });
}

function waitForClick(selectors, ver) {
    return new Promise((resolve, reject) => {
        const handlers = [];
        selectors.forEach(({ el, value }) => {
            const h = () => {
                if (ver !== undefined && ver !== flowVersion) { reject('cancelled'); return; }
                handlers.forEach(x => x.el.removeEventListener('click', x.h));
                resolve(value);
            };
            const elem = typeof el === 'string' ? document.getElementById(el) : el;
            if (elem) {
                elem.addEventListener('click', h);
                handlers.push({ el: elem, h });
            }
        });
    });
}

function slugify(text) {
    return text.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
}

// ─── NAVIGATION ───

function navigateToStep(target) {
    if (target < 1 || target > totalSteps || target === currentStep) return;
    flowVersion++;
    disableInput();
    addMessage(`Torniamo allo step "${STEP_LABELS[target - 1]}"...`, 'alberto');
    runStep(target);
}

backBtn.addEventListener('click', () => {
    if (currentStep > 1) navigateToStep(currentStep - 1);
});

async function runStep(n) {
    const ver = flowVersion;
    currentStep = n;
    visitedSteps.add(n);
    updateProgress();
    renderStepNav();
    updateBackBtn();

    try {
        switch (n) {
            case 1: await step1_benvenuto(ver); break;
            case 2: await step2_descrizione(ver); break;
            case 3: await step3_colori(ver); break;
            case 4: await step4_layout(ver); break;
            case 5: await step5_contenuti(ver); break;
            case 6: await step6_immagini(ver); break;
            case 7: await step7_anteprima(ver); break;
            case 8: await step8_conferma(ver); break;
        }
    } catch (e) {
        if (e === 'cancelled') return;
        throw e;
    }
}

async function goNext(ver) {
    if (ver !== flowVersion) return;
    if (currentStep < totalSteps) {
        await runStep(currentStep + 1);
    }
}

// ─── STEPS ───

async function step1_benvenuto(ver) {
    if (!visitedSteps.has(1) || !siteData.nome) {
        await albertoSays(`Ciao! Sono <strong>Alberto</strong>, il tuo assistente digitale. Ti aiutero a creare il sito web perfetto per la tua attivita a Ponza.`, '', ver);
    }
    await albertoSays(`Come si chiama la tua attivita?` + (siteData.nome ? ` <em>(attuale: ${siteData.nome})</em>` : ''), '', ver);

    enableInput(siteData.nome || 'Es: Ristorante Da Mario...');
    if (siteData.nome) chatInput.value = siteData.nome;
    siteData.nome = await getUserInput(ver);

    await albertoSays(`<strong>${siteData.nome}</strong> — bel nome! Che tipo di attivita e?`,
        `<div class="type-grid" id="typeGrid">
            ${ACTIVITY_TYPES.map(t => `<div class="type-btn ${siteData.tipo === t.id ? 'selected' : ''}" data-value="${t.id}"><i class="fas ${t.icon}"></i> ${t.label}</div>`).join('')}
        </div>`, ver
    );

    const typeId = await waitForSelection(document.getElementById('typeGrid'), '.type-btn', ver);
    const chosen = ACTIVITY_TYPES.find(t => t.id === typeId);
    siteData.tipo = typeId;
    siteData.tipoLabel = chosen ? chosen.label : typeId;
    addMessage(siteData.tipoLabel, 'user');

    updatePreview();
    await goNext(ver);
}

    enableInput('Racconta la tua attivita...');

async function step6_immagini(ver) {
    const uploadedHTML = siteData.uploadedImages.length > 0
        ? `<div class="upload-preview">${siteData.uploadedImages.map((img, i) =>
            `<div class="upload-thumb"><img src="${img}"><button class="remove-img" data-idx="${i}"><i class="fas fa-times"></i></button></div>`
        ).join('')}</div>` : '';

    await albertoSays(`Scegli un'immagine per la copertina. Puoi caricare una tua foto o sceglierne una delle nostre:`,
        `<div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p><strong>Carica la tua immagine</strong><br>Clicca o trascina qui</p>
            <input type="file" id="fileUpload" accept="image/*" multiple>
        </div>
        <div id="uploadPreviewContainer">${uploadedHTML}</div>
        <p style="margin:12px 0 4px;font-size:0.85rem;color:#888;font-weight:600;">Oppure scegli dalle nostre foto:</p>
        <div class="selection-grid" id="imageGrid">
            ${STOCK_IMAGES.map(img => `
                <div class="sel-card ${siteData.heroImage === img.url ? 'selected' : ''}" data-value="${img.url}" style="padding:4px;">
                    <img src="${img.url}" class="img-option" style="width:100%;height:70px;border:none;" alt="${img.label}">
                    <div class="sel-card-name">${img.label}</div>
                </div>
            `).join('')}
        </div>`, ver
    );

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileUpload');
    const previewContainer = document.getElementById('uploadPreviewContainer');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--blu-mare)'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--azzurro)'; });
    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.style.borderColor = 'var(--azzurro)';
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(files) {
        Array.from(files).forEach(file => {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                siteData.uploadedImages.push(dataUrl);
                renderUploadPreviews();
                siteData.heroImage = dataUrl;
                updatePreview();
                document.getElementById('imageGrid').querySelectorAll('.sel-card').forEach(c => c.classList.remove('selected'));
            };
            reader.readAsDataURL(file);
        });
    }

    function renderUploadPreviews() {
        previewContainer.innerHTML = `<div class="upload-preview">${siteData.uploadedImages.map((img, i) =>
            `<div class="upload-thumb" data-url="${img}" style="cursor:pointer;"><img src="${img}"><button class="remove-img" data-idx="${i}"><i class="fas fa-times"></i></button></div>`
        ).join('')}</div>`;

        previewContainer.querySelectorAll('.remove-img').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.dataset.idx);
                const removed = siteData.uploadedImages.splice(idx, 1)[0];
                if (siteData.heroImage === removed && siteData.uploadedImages.length > 0) {
                    siteData.heroImage = siteData.uploadedImages[siteData.uploadedImages.length - 1];
                }
                renderUploadPreviews();
                updatePreview();
            });
        });

        previewContainer.querySelectorAll('.upload-thumb').forEach(thumb => {
            thumb.addEventListener('click', () => {
                siteData.heroImage = thumb.dataset.url;
                updatePreview();
                document.getElementById('imageGrid').querySelectorAll('.sel-card').forEach(c => c.classList.remove('selected'));
                addMessage('Immagine personale selezionata!', 'user');
            });
        });
    }

    const imgUrl = await waitForSelection(document.getElementById('imageGrid'), '.sel-card', ver);
    siteData.heroImage = imgUrl;
    addMessage(`Immagine: scelta!`, 'user');

    updatePreview();
    await goNext(ver);
}

async function step8_conferma(ver) {
    await albertoSays(`Riepilogo del tuo sito:
        <br><br><strong>${siteData.nome}</strong> (${siteData.tipoLabel})
        <br>Palette: ${siteData.palette ? siteData.palette.name : '-'}
        <br>Layout: ${siteData.layout ? siteData.layout.name : '-'}
        <br>Dominio: <strong>${siteData.sottodominio}.ponza.online</strong>
        <br><br>Sei soddisfatto o vuoi modificare qualcosa?`,
        `<div class="modify-grid">
            <button class="modify-btn" data-action="conferma"><i class="fas fa-rocket"></i> Conferma e pubblica!</button>
            <button class="modify-btn" data-action="colori"><i class="fas fa-palette"></i> Cambia colori</button>
            <button class="modify-btn" data-action="layout"><i class="fas fa-columns"></i> Cambia layout</button>
            <button class="modify-btn" data-action="testi"><i class="fas fa-pen"></i> Modifica testi</button>
            <button class="modify-btn" data-action="immagine"><i class="fas fa-image"></i> Cambia immagine</button>
            <button class="modify-btn" data-action="contenuti"><i class="fas fa-address-card"></i> Modifica info</button>
        </div>`, ver
    );

    const action = await new Promise((resolve, reject) => {
        const btns = document.querySelectorAll('.modify-btn');
        function handler() {
            if (ver !== flowVersion) { reject('cancelled'); return; }
            btns.forEach(b => b.removeEventListener('click', clickHandler));
            resolve(this.dataset.action);
        }
        function clickHandler(e) { handler.call(this); }
        btns.forEach(btn => btn.addEventListener('click', clickHandler));
    });

    if (action === 'conferma') {
        addMessage('Conferma e pubblica!', 'user');

        await albertoSays(`<div class="deploy-animation"><div class="deploy-spinner"></div><p>Pubblicazione in corso su <strong>${siteData.sottodominio}.ponza.online</strong>...</p></div>`, '', ver);
        await delay(2500);
        if (ver !== flowVersion) return;

        await albertoSays(`<div class="deploy-animation"><div class="deploy-done"><i class="fas fa-check-circle"></i></div><p style="margin-top:8px;"><strong>Richiesta inviata con successo!</strong></p></div>`, '', ver);

        await albertoSays(`Il tuo sito <strong>${siteData.nome}</strong> sara online su <strong>${siteData.sottodominio}.ponza.online</strong> in poche ore. Riceverai una email di conferma all'indirizzo associato al tuo account.`, '', ver);
        await albertoSays(`Se avrai bisogno di contattarci, non esitare a usare la <strong>chat di ponza.online</strong>! Grazie per aver scelto Ponza Digitale. In bocca al lupo! <i class="fas fa-hand-peace" style="color:var(--azzurro);"></i>`, '', ver);
    } else {
        const stepMap = { colori: 3, layout: 4, testi: 2, immagine: 6, contenuti: 5 };
        const target = stepMap[action];
        if (target) {
            addMessage(`Vorrei modificare: ${STEP_LABELS[target - 1]}`, 'user');
            navigateToStep(target);
        }
    }
}

// ─── START ───
runStep(1);

</script>
